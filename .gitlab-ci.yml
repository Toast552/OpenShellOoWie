stages:
  - build-ci-image
  - lint
  - test
  - publish

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_TERM_COLOR: "always"
  CI_IMAGE: $CI_REGISTRY_IMAGE/ci:latest

default:
  image: $CI_IMAGE
  tags:
    - agent-dev-kit-build

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - target/
    - .venv/

# Install Python dependencies (cached in .venv/)
before_script:
  - uv sync --frozen

# =============================================================================
# CI Image Build (runs only when dependencies change)
# =============================================================================
build_ci_image:
  stage: build-ci-image
  image: docker:24
  services:
    - docker:24-dind
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script: []  # Override default before_script (docker:24 doesn't have uv)
  when: manual
  allow_failure: true
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      docker build \
        --cache-from $CI_IMAGE \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -f deploy/docker/Dockerfile.ci \
        -t $CI_IMAGE \
        .
    - docker push $CI_IMAGE

# =============================================================================
# Lint Jobs
# =============================================================================
fmt_check:
  stage: lint
  script:
    - mise run fmt:check

clippy:
  stage: lint
  script:
    - mise run clippy

python_lint:
  stage: lint
  script:
    - mise run python:lint

# =============================================================================
# Test Jobs
# =============================================================================
rust_test:
  stage: test
  script:
    - mise run test:rust

python_test:
  stage: test
  script:
    - mise run test:python

python_e2e_sandbox_test:
  stage: test
  services:
    - docker:24-dind
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  before_script:
    - uv sync --frozen
    - apt-get update -qq && apt-get install -y -qq socat >/dev/null
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz --strip-components=1 -C /usr/local/bin docker/docker
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - curl -fsSL https://github.com/docker/buildx/releases/download/v0.21.1/buildx-v0.21.1.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
  script:
    - socat UNIX-LISTEN:/var/run/docker.sock,fork,reuseaddr TCP:docker:2375 &
    - sleep 1
    - mise run cluster
    - mise run test:e2e:sandbox

# =============================================================================
# Publish Jobs (main branch only)
# =============================================================================
publish_ecr_images:
  stage: publish
  services:
    - docker:24-dind
  tags:
    - agent-dev-kit-build
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
    DOCKER_BUILDKIT: "1"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - uv sync --frozen
    # Install Docker CLI + buildx plugin (CI image has mise/helm but no Docker client)
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz --strip-components=1 -C /usr/local/bin docker/docker
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - curl -fsSL https://github.com/docker/buildx/releases/download/v0.21.1/buildx-v0.21.1.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
    # Install AWS CLI
    - apt-get update -qq && apt-get install -y -qq unzip >/dev/null
    - curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
    - unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install && rm -rf /tmp/aws /tmp/awscliv2.zip
    # Authenticate to ECR
    - aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 012345678901.dkr.ecr.us-west-2.amazonaws.com
  script:
    - mise run docker:publish:cluster:multiarch
